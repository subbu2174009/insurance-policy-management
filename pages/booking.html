```html id="4s70zl"
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>{{title}}</title>

    <link rel="stylesheet" href="/style.css">

</head>

<body>

<div class="topbar">

    <h1>
        Insurance Policy Management
    </h1>

    <a href="/">

        <button style="
        width:auto;
        padding:10px 20px;
        ">
            Logout
        </button>

    </a>

</div>

<div class="auth-container">

    <div class="auth-box">

        <div style="
        text-align:center;
        margin-bottom:25px;
        ">

            <h2 style="
            margin-bottom:10px;
            color:#1e3a8a;
            ">
                {{title}}
            </h2>

            <p style="
            color:#64748b;
            ">
                Manage Insurance Policy Details Securely
            </p>

        </div>

        <form
        action="{{action}}"
        method="POST"
        onsubmit="return validateForm()">

            <input
            type="hidden"
            name="username"
            value="{{username}}">

            {{idField}}

            <label>
                Policy Name
            </label>

            <input
            type="text"
            id="policy_name"
            name="policy_name"
            placeholder="Enter Policy Name"
            value="{{policy_name}}">

            <label
            style="
            margin-top:15px;
            display:block;
            ">
            Premium Amount
            </label>

            <input
            type="number"
            id="premium"
            name="premium"
            placeholder="Enter Premium Amount"
            value="{{premium}}">

            <label
            style="
            margin-top:15px;
            display:block;
            ">
            Coverage Details
            </label>

            <textarea
            id="coverage"
            name="coverage"
            placeholder="Enter Coverage Details"
            rows="4">{{coverage}}</textarea>

            <label
            style="
            margin-top:15px;
            display:block;
            ">
            Policy Duration
            </label>

            <select
            id="duration"
            name="duration">

                <option value="">
                    Select Duration
                </option>

                <option value="1 Year">
                    1 Year
                </option>

                <option value="2 Years">
                    2 Years
                </option>

                <option value="5 Years">
                    5 Years
                </option>

                <option value="10 Years">
                    10 Years
                </option>

            </select>

            <label
            style="
            margin-top:15px;
            display:block;
            ">
            Policy Description
            </label>

            <textarea
            id="description"
            name="description"
            placeholder="Enter Policy Description"
            rows="5">{{description}}</textarea>

            <div
            id="error"
            class="error"
            style="
            margin-top:12px;
            ">
            </div>

            <button>

                Save Policy

            </button>

        </form>

        <div
        style="
        text-align:center;
        margin-top:20px;
        ">

            <a href="javascript:history.back()">

                ← Go Back

            </a>

        </div>

    </div>

</div>

<script>

function validateForm() {

    let policyName =
    document.getElementById("policy_name").value.trim();

    let premium =
    document.getElementById("premium").value.trim();

    let coverage =
    document.getElementById("coverage").value.trim();

    let duration =
    document.getElementById("duration").value;

    let description =
    document.getElementById("description").value.trim();

    let error =
    document.getElementById("error");

    error.innerHTML = "";

    if(policyName.length < 5) {

        error.innerHTML =
        "Policy name must contain at least 5 characters.";

        return false;
    }

    if(premium <= 0) {

        error.innerHTML =
        "Premium amount must be greater than 0.";

        return false;
    }

    if(coverage.length < 10) {

        error.innerHTML =
        "Coverage details are too short.";

        return false;
    }

    if(duration === "") {

        error.innerHTML =
        "Please select policy duration.";

        return false;
    }

    if(description.length < 15) {

        error.innerHTML =
        "Description must contain at least 15 characters.";

        return false;
    }

    return true;
}

</script>

</body>

</html>
