```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Agent Portal Login</title>

    <link rel="stylesheet" href="/style.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-box">

        <div style="text-align:center;margin-bottom:25px;">

            <h1 style="margin-bottom:10px;">
                Agent Portal
            </h1>

            <p style="color:#64748b;">
                Secure Insurance Management Access
            </p>

        </div>

        <form
        action="/login"
        method="POST"
        onsubmit="return validateForm()">

            <input
            type="hidden"
            name="role"
            value="agent">

            <label>
                Agent Username
            </label>

            <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter Username"
            autocomplete="off">

            <label style="margin-top:15px;display:block;">
                Password
            </label>

            <div style="position:relative;">

                <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter Password">

                <span
                onclick="togglePassword()"
                style="
                position:absolute;
                right:15px;
                top:16px;
                cursor:pointer;
                color:#2563eb;
                font-size:14px;
                ">
                Show
                </span>

            </div>

            <div
            id="strengthBox"
            style="
            margin-top:10px;
            font-size:14px;
            font-weight:600;
            ">
            </div>

            <p id="error"
            class="error"
            style="margin-top:12px;"></p>

            <button>
                Login Securely
            </button>

        </form>

        <div
        style="
        text-align:center;
        margin-top:20px;
        ">

            <p style="margin-bottom:10px;">

                New Insurance Agent?

            </p>

            <a href="/agent-register">

                <button type="button">

                    Create Agent Account

                </button>

            </a>

        </div>

        <div
        style="
        text-align:center;
        margin-top:18px;
        ">

            <a href="/">

                ← Back to Main Login

            </a>

        </div>

    </div>

</div>

<script>

function validateForm() {

    let username =
    document.getElementById("username").value.trim();

    let password =
    document.getElementById("password").value;

    let error =
    document.getElementById("error");

    error.innerHTML = "";

    const usernameRegex =
    /^[A-Za-z0-9_]{5,20}$/;

    if(!usernameRegex.test(username)) {

        error.innerHTML =
        "Username must be 5-20 characters and only contain letters, numbers or underscore.";

        return false;
    }

    const passwordRegex =
    /^(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}$/;

    if(!passwordRegex.test(password)) {

        error.innerHTML =
        "Password must contain uppercase letter, number and special character.";

        return false;
    }

    return true;
}

function togglePassword() {

    let password =
    document.getElementById("password");

    if(password.type === "password") {

        password.type = "text";

    } else {

        password.type = "password";
    }
}

document
.getElementById("password")
.addEventListener("keyup", function() {

    let password = this.value;

    let box =
    document.getElementById("strengthBox");

    if(password.length < 6) {

        box.innerHTML =
        "Weak Password";

        box.style.color = "red";
    }

    else if(password.length < 10) {

        box.innerHTML =
        "Medium Strength Password";

        box.style.color = "orange";
    }

    else {

        box.innerHTML =
        "Strong Password";

        box.style.color = "green";
    }
});

</script>

</body>

</html>
```
